<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWT Medical – Dentalna rješenja za 3D tisak</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #004AAD;
      --blue-dark: #003580;
      --blue-light: #1A6DD4;
      --blue-pale: #EBF2FF;
      --white: #FFFFFF;
      --grey-100: #F4F7FB;
      --grey-200: #E2EAF4;
      --grey-600: #5A6A7E;
      --text: #111827;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,74,173,0.10);
      --shadow-lg: 0 12px 48px rgba(0,74,173,0.16);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      height: 72px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    }

    .nav-logo {
      height: 72px;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .nav-logo img {
      height: 210px;
      display: block;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
    }

    .nav-links a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #fff; }

    .nav-cta {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff !important;
      padding: 0.45rem 1.2rem;
      border-radius: 6px;
      transition: background 0.2s !important;
    }

    .nav-cta:hover { background: rgba(255,255,255,0.25) !important; }

    .lang-select {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      font-family: inherit;
    }

    .lang-select option {
      background: var(--blue);
      color: #fff;
      font-weight: 700;
    }

    .lang-select:hover { background: rgba(255,255,255,0.25); }

    /* ── HERO ── */
    .hero {
      background: var(--blue);
      padding: 140px 5% 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      min-height: 100vh;
    }

    .hero-text h1 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 1.4rem;
    }

    .hero-text h1 span { color: #7EC8F5; }

    .hero-text p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.8);
      max-width: 520px;
      margin-bottom: 2.2rem;
    }

    .hero-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: #fff;
      color: var(--blue);
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      display: inline-block;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    .btn-outline {
      border: 2px solid rgba(255,255,255,0.5);
      color: #fff;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
      display: inline-block;
    }

    .btn-outline:hover {
      border-color: #fff;
      background: rgba(255,255,255,0.1);
    }

    .hero-image-wrap {
      position: relative;
      display: flex;
      justify-content: center;
    }

    .hero-image-wrap img {
      width: 100%;
      max-width: 460px;
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
    }

    .hero-badge {
      position: absolute;
      bottom: -16px;
      left: 20px;
      background: #fff;
      color: var(--blue);
      padding: 0.7rem 1.2rem;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 700;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .hero-badge .dot {
      width: 8px; height: 8px;
      background: #22C55E;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── SECTION WRAPPERS ── */
    section { padding: 90px 5%; }

    .section-label {
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 0.6rem;
    }

    .section-title {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 1rem;
    }

    .section-desc {
      color: var(--grey-600);
      font-size: 1.05rem;
      max-width: 640px;
    }

    .section-header { margin-bottom: 3.5rem; }
    .section-header.center { text-align: center; }
    .section-header.center .section-desc { margin: 0 auto; }

    /* ── STATS STRIP ── */
    .stats-strip {
      background: var(--blue-pale);
      padding: 50px 5%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      text-align: center;
    }

    .stat-item h3 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--blue);
    }

    .stat-item p {
      color: var(--grey-600);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    /* ── PRODUCT SECTION ── */
    .product-section { background: var(--white); }

    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }

    .product-image-wrap { position: relative; }

    .product-image-wrap img {
      width: 100%;
      max-width: 480px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
    }

    .product-tag {
      position: absolute;
      top: -14px; right: -14px;
      background: var(--blue);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .product-info .section-title { margin-bottom: 1rem; }

    .product-desc {
      color: var(--grey-600);
      line-height: 1.75;
      margin-bottom: 2rem;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .spec-card {
      background: var(--grey-100);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      border-left: 3px solid var(--blue);
    }

    .spec-card .spec-value {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--blue);
    }

    .spec-card .spec-label {
      font-size: 0.8rem;
      color: var(--grey-600);
      margin-top: 0.15rem;
    }

    .certifications {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .cert-badge {
      background: var(--blue);
      color: #fff;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    /* ── SHADES ── */
    .shades-section { background: var(--grey-100); }

    .shades-grid {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 2rem;
    }

    .shade-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.4rem 1.8rem;
      text-align: center;
      box-shadow: var(--shadow);
      min-width: 120px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .shade-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .shade-swatch {
      width: 60px; height: 60px;
      border-radius: 50%;
      margin: 0 auto 0.8rem;
      border: 2px solid var(--grey-200);
    }

    .shade-name {
      font-weight: 700;
      color: var(--text);
      font-size: 1rem;
    }

    .shade-note {
      font-size: 0.75rem;
      color: var(--grey-600);
      margin-top: 0.2rem;
    }

    /* ── APPLICATIONS ── */
    .applications-section { background: var(--white); }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .app-card {
      background: var(--grey-100);
      border-radius: var(--radius);
      padding: 2rem 1.8rem;
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      border: 1px solid transparent;
    }

    .app-card:hover {
      background: var(--white);
      box-shadow: var(--shadow-lg);
      border-color: var(--blue-pale);
      transform: translateY(-4px);
    }

    .app-icon {
      width: 52px; height: 52px;
      background: var(--blue);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.2rem;
    }

    .app-icon svg {
      width: 26px; height: 26px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .app-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
    }

    .app-card p {
      font-size: 0.9rem;
      color: var(--grey-600);
      line-height: 1.6;
    }

    /* ── GALLERY ── */
    .gallery-section { background: var(--grey-100); }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .gallery-item {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
    }

    .gallery-item.wide { grid-column: span 2; }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
      display: block;
    }

    .gallery-item:hover img { transform: scale(1.05); }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,74,173,0.8) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 1.2rem;
    }

    .gallery-item:hover .gallery-overlay { opacity: 1; }

    .gallery-caption {
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* ── PAINTART ── */
    .paintart-section {
      background: var(--blue);
      color: #fff;
    }

    .paintart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }

    .paintart-section .section-label { color: #7EC8F5; }
    .paintart-section .section-title { color: #fff; }
    .paintart-section .section-desc { color: rgba(255,255,255,0.75); max-width: 100%; }

    .paintart-features {
      list-style: none;
      margin-top: 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .paintart-features li {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      color: rgba(255,255,255,0.85);
      font-size: 0.95rem;
    }

    .paintart-features li::before {
      content: '';
      width: 7px; height: 7px;
      background: #7EC8F5;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.55rem;
    }

    .paintart-colors {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .color-chip {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      position: relative;
      cursor: default;
    }

    .color-chip::after {
      content: attr(data-name);
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
    }

    .paintart-image {
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      background: #fff;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .paintart-image img { width: 100%; display: block; }

    /* ── PROCESS ── */
    .process-section { background: var(--white); }

    .process-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      position: relative;
    }

    .process-steps::before {
      content: '';
      position: absolute;
      top: 32px;
      left: calc(12.5% + 32px);
      right: calc(12.5% + 32px);
      height: 2px;
      background: linear-gradient(to right, var(--blue), var(--blue-light));
      z-index: 0;
    }

    .process-step {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .step-number {
      width: 64px; height: 64px;
      background: var(--blue);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 800;
      border: 4px solid #fff;
      box-shadow: 0 0 0 2px var(--blue);
    }

    .process-step h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.5rem; }
    .process-step p { font-size: 0.85rem; color: var(--grey-600); line-height: 1.6; }

    /* ── CTA ── */
    .cta-section {
      background: var(--blue-pale);
      text-align: center;
      padding: 80px 5%;
    }

    .cta-section .section-title { max-width: 600px; margin: 0 auto 1rem; }
    .cta-section .section-desc { margin: 0 auto 2.5rem; }

    .cta-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-blue {
      background: var(--blue);
      color: #fff;
      padding: 0.9rem 2.2rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
      display: inline-block;
    }

    .btn-blue:hover { background: var(--blue-dark); transform: translateY(-2px); }

    .btn-ghost {
      border: 2px solid var(--blue);
      color: var(--blue);
      padding: 0.9rem 2.2rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: background 0.2s;
      display: inline-block;
    }

    .btn-ghost:hover { background: var(--blue-pale); }

    /* ── FOOTER ── */
    footer {
      background: var(--blue-dark);
      color: rgba(255,255,255,0.7);
      padding: 48px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .footer-logo { height: 36px; overflow: hidden; display: flex; align-items: center; }
    .footer-logo img { height: 110px; display: block; }
    .footer-copy { font-size: 0.85rem; }

    .footer-links { display: flex; gap: 1.5rem; }

    .footer-links a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: #fff; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; padding-top: 100px; text-align: center; }
      .hero-image-wrap { display: none; }
      .product-grid { grid-template-columns: 1fr; }
      .apps-grid { grid-template-columns: 1fr 1fr; }
      .gallery-grid { grid-template-columns: 1fr 1fr; }
      .gallery-item.wide { grid-column: span 1; }
      .paintart-grid { grid-template-columns: 1fr; }
      .process-steps { grid-template-columns: 1fr 1fr; }
      .process-steps::before { display: none; }
      .stats-strip { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .apps-grid { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: 1fr; }
      .process-steps { grid-template-columns: 1fr; }
      .stats-strip { grid-template-columns: 1fr 1fr; }
      .specs-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="#top">
      <img src="brand_assets/GWT Medical logo.png" alt="GWT Medical" />
    </a>
    <ul class="nav-links">
      <li><a href="#product">Crowntec</a></li>
      <li><a href="#applications" data-i18n="nav-applications"></a></li>
      <li><a href="#gallery" data-i18n="nav-gallery"></a></li>
      <li><a href="#paintart">Paintart</a></li>
      <li><a href="#contact" class="nav-cta" data-i18n="nav-contact"></a></li>
      <li>
        <select class="lang-select" id="langToggle" onchange="applyLang(this.value)">
          <option value="hr">HR</option>
          <option value="en">EN</option>
        </select>
      </li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero" id="top">
    <div class="hero-text">
      <p class="section-label" style="color:#7EC8F5;" data-i18n="hero-label"></p>
      <h1 data-i18n="hero-h1"></h1>
      <p data-i18n="hero-p"></p>
      <div class="hero-buttons">
        <a href="#product" class="btn-primary" data-i18n="hero-btn1"></a>
        <a href="#gallery" class="btn-outline" data-i18n="hero-btn2"></a>
      </div>
    </div>
    <div class="hero-image-wrap">
      <img src="brand_assets/crowntec.webp" alt="Saremco Print Crowntec" />
      <div class="hero-badge">
        <span class="dot"></span>
        <span data-i18n="hero-badge"></span>
      </div>
    </div>
  </section>

  <!-- STATS -->
  <div class="stats-strip">
    <div class="stat-item">
      <h3>&gt;135 MPa</h3>
      <p data-i18n="stat1"></p>
    </div>
    <div class="stat-item">
      <h3>&gt;4000 MPa</h3>
      <p data-i18n="stat2"></p>
    </div>
    <div class="stat-item">
      <h3>4 <span data-i18n="stat3-unit"></span></h3>
      <p data-i18n="stat3"></p>
    </div>
    <div class="stat-item">
      <h3>10+ <span data-i18n="stat4-unit"></span></h3>
      <p data-i18n="stat4"></p>
    </div>
  </div>

  <!-- PRODUCT -->
  <section class="product-section" id="product">
    <div class="product-grid">
      <div class="product-image-wrap">
        <div class="product-tag" data-i18n="product-tag"></div>
        <img src="brand_assets/crowntec.webp" alt="Saremco Print Crowntec" />
      </div>
      <div class="product-info">
        <p class="section-label" data-i18n="product-label"></p>
        <h2 class="section-title">Saremco Print Crowntec</h2>
        <p class="product-desc" data-i18n="product-desc"></p>
        <div class="specs-grid">
          <div class="spec-card">
            <div class="spec-value">&gt;135 MPa</div>
            <div class="spec-label" data-i18n="spec1-label"></div>
          </div>
          <div class="spec-card">
            <div class="spec-value">&gt;4000 MPa</div>
            <div class="spec-label" data-i18n="spec2-label"></div>
          </div>
          <div class="spec-card">
            <div class="spec-value">500 g</div>
            <div class="spec-label" data-i18n="spec3-label"></div>
          </div>
          <div class="spec-card">
            <div class="spec-value">4 <span data-i18n="stat3-unit"></span></div>
            <div class="spec-label" data-i18n="spec4-label"></div>
          </div>
        </div>
        <p style="font-size:0.85rem; font-weight:600; color:var(--grey-600); margin-bottom:0.8rem;" data-i18n="reg-label"></p>
        <div class="certifications">
          <span class="cert-badge">FDA 510(k)</span>
          <span class="cert-badge">CE Mark</span>
          <span class="cert-badge">TGA</span>
          <span class="cert-badge">ISO 4049</span>
        </div>
      </div>
    </div>
  </section>

  <!-- SHADES -->
  <section class="shades-section">
    <div class="section-header center">
      <p class="section-label" data-i18n="shades-label"></p>
      <h2 class="section-title" data-i18n="shades-title"></h2>
      <p class="section-desc" data-i18n="shades-desc"></p>
    </div>
    <div class="shades-grid">
      <div class="shade-card">
        <div class="shade-swatch" style="background:#F8F3ED;"></div>
        <div class="shade-name">Snow White</div>
        <div class="shade-note" data-i18n="shade-bleach"></div>

    function applyLang(lang) {
      const t = translations[lang];

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key] !== undefined) el.innerHTML = t[key];
      });

      document.querySelectorAll('[data-i18n-chip]').forEach(el => {
        const key = el.dataset.i18nChip;
        if (t[key] !== undefined) el.dataset.name = t[key];
      });

      document.documentElement.lang = lang;
      document.getElementById('langToggle').value = lang;
      currentLang = lang;
    }

    applyLang('hr');
  </script>

</body>
</html>
