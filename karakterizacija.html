<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karakterizacija – GWT Medical</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #004AAD; --blue-dark: #003580; --blue-light: #1A6DD4;
      --blue-pale: #EBF2FF; --white: #FFFFFF;
      --grey-100: #F4F7FB; --grey-200: #E2EAF4; --grey-600: #5A6A7E;
      --text: #111827; --radius: 12px;
      --shadow: 0 4px 24px rgba(0,74,173,0.10);
      --shadow-lg: 0 12px 48px rgba(0,74,173,0.16);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: var(--text); background: var(--white); line-height: 1.6; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--blue); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 72px; box-shadow: 0 2px 16px rgba(0,0,0,0.18); }
    .nav-logo { height: 72px; overflow: hidden; display: flex; align-items: center; }
    .nav-logo img { height: 210px; display: block; flex-shrink: 0; }
    .nav-links { display: flex; gap: 0.2rem; list-style: none; align-items: center; }
    .nav-links > li { position: relative; }
    .nav-links > li > a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.02em; transition: color 0.2s; display: flex; align-items: center; gap: 0.3rem; padding: 0.4rem 0.75rem; border-radius: 6px; white-space: nowrap; }
    .nav-links > li > a:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .nav-arrow { font-size: 0.6rem; opacity: 0.75; transition: transform 0.2s; flex-shrink: 0; }
    .nav-links > li:hover .nav-arrow { transform: rotate(180deg); }
    .nav-dropdown { position: absolute; top: 100%; left: 0; background: #fff; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,74,173,0.18); min-width: 210px; opacity: 0; pointer-events: none; transform: translateY(-4px); transition: opacity 0.2s, transform 0.2s; z-index: 200; padding: 0.4rem; padding-top: 0.6rem; border: 1px solid var(--grey-200); }
    .nav-links > li:hover .nav-dropdown, .nav-links > li:focus-within .nav-dropdown { opacity: 1; pointer-events: all; transform: translateY(0); }
    .nav-dropdown a { display: block; padding: 0.65rem 1rem; color: var(--text); text-decoration: none; font-size: 0.875rem; font-weight: 500; border-radius: 7px; transition: background 0.15s, color 0.15s; white-space: nowrap; }
    .nav-dropdown a:hover { background: var(--blue-pale); color: var(--blue); }
    .nav-contact-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff !important; padding: 0.4rem 1rem !important; border-radius: 6px; transition: background 0.2s !important; }
    .nav-contact-btn:hover { background: rgba(255,255,255,0.25) !important; }
    .lang-select { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.35); color: #fff; padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; transition: background 0.2s; appearance: none; -webkit-appearance: none; outline: none; font-family: inherit; }
    .lang-select option { background: var(--blue); color: #fff; font-weight: 700; }
    .lang-select:hover { background: rgba(255,255,255,0.25); }

    /* PAGE HERO */
    .page-hero { background: var(--blue); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 5% 80px; }
    .page-hero h1 { font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 800; color: #fff; margin-bottom: 1rem; line-height: 1.15; }
    .page-hero p { color: rgba(255,255,255,0.65); font-size: 1.05rem; margin-bottom: 2.5rem; }
    .back-link { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.9rem; font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 2px; transition: color 0.2s, border-color 0.2s; }
    .back-link:hover { color: #fff; border-color: rgba(255,255,255,0.8); }

    /* FOOTER */
    footer { background: var(--blue-dark); color: rgba(255,255,255,0.7); padding: 48px 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; }
    .footer-logo { height: 36px; overflow: hidden; display: flex; align-items: center; }
    .footer-logo img { height: 110px; display: block; }
    .footer-copy { font-size: 0.85rem; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
    .footer-links a:hover { color: #fff; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <img src="brand_assets/GWT Medical logo.png" alt="GWT Medical" />
    </a>
    <ul class="nav-links">
      <li>
        <a href="#">
          <span data-i18n="nav-3dprint"></span>
          <span class="nav-arrow">▼</span>
        </a>
        <div class="nav-dropdown">
          <a href="3d-printeri.html" data-i18n="nav-printers"></a>
          <a href="3d-print-materijali.html" data-i18n="nav-materials"></a>
        </div>
      </li>
      <li>
        <a href="#">
          <span data-i18n="nav-dentistry"></span>
          <span class="nav-arrow">▼</span>
        </a>
        <div class="nav-dropdown">
          <a href="adhezija-jetkanje.html" data-i18n="nav-adhesion"></a>
          <a href="kompoziti.html" data-i18n="nav-composites"></a>
          <a href="cementi.html" data-i18n="nav-cements"></a>
          <a href="primeri.html" data-i18n="nav-primers"></a>
          <a href="karakterizacija.html" data-i18n="nav-characterization"></a>
        </div>
      </li>
      <li><a href="#" data-i18n="nav-services"></a></li>
      <li><a href="#" data-i18n="nav-education"></a></li>
      <li><a href="#" data-i18n="nav-support"></a></li>
      <li><a href="index.html#contact" class="nav-contact-btn" data-i18n="nav-contact"></a></li>
      <li>
        <a href="#">
          <span id="langLabel">HR</span>
          <span class="nav-arrow">▼</span>
        </a>
        <div class="nav-dropdown lang-dropdown">
          <a href="#" id="lang-hr" onclick="applyLang('hr'); return false;">HR – Hrvatski</a>
          <a href="#" id="lang-en" onclick="applyLang('en'); return false;">EN – English</a>
        </div>
      </li>
    </ul>
  </nav>

  <section class="page-hero">
    <h1 data-i18n="page-title"></h1>
    <p data-i18n="page-coming-soon"></p>
    <a href="index.html" class="back-link" data-i18n="page-back"></a>
  </section>

  <footer>
    <div class="footer-logo">
      <img src="brand_assets/GWT Medical logo.png" alt="GWT Medical" />
    </div>
    <p class="footer-copy" data-i18n="footer-copy"></p>
    <div class="footer-links">
      <a href="index.html" data-i18n="footer-link1"></a>
      <a href="index.html#contact" data-i18n="footer-link3"></a>
    </div>
  </footer>

  <script>
    const translations = {
      hr: {
        'nav-3dprint':'3D Print','nav-printers':'3D Printeri','nav-materials':'3D Print Materijali',
        'nav-dentistry':'Stomatologija','nav-adhesion':'Adhezija/jetkanje','nav-composites':'Kompoziti',
        'nav-cements':'Cementi','nav-primers':'Primeri','nav-characterization':'Karakterizacija',
        'nav-services':'Usluge','nav-education':'Edukacija','nav-support':'Podrška','nav-contact':'Kontakt',
        'page-title':'Karakterizacija',
        'page-coming-soon':'Sadržaj stranice je u pripremi.',
        'page-back':'← Natrag na početnu',
        'footer-copy':'© 2026 GWT Medical. Sva prava pridržana.',
        'footer-link1':'Početna','footer-link3':'Kontakt',
      },
      en: {
        'nav-3dprint':'3D Print','nav-printers':'3D Printers','nav-materials':'3D Print Materials',
        'nav-dentistry':'Dentistry','nav-adhesion':'Adhesion/Etching','nav-composites':'Composites',
        'nav-cements':'Cements','nav-primers':'Primers','nav-characterization':'Characterization',
        'nav-services':'Services','nav-education':'Education','nav-support':'Support','nav-contact':'Contact',
        'page-title':'Characterization',
        'page-coming-soon':'Page content is being prepared.',
        'page-back':'← Back to home',
        'footer-copy':'© 2026 GWT Medical. All rights reserved.',
        'footer-link1':'Home','footer-link3':'Contact',
      }
    };
    let currentLang = 'hr';
    function applyLang(lang) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (translations[lang][key] !== undefined) el.innerHTML = translations[lang][key];
      });
      document.documentElement.lang = lang;
      document.getElementById('langLabel').textContent = lang.toUpperCase();
      document.getElementById('lang-hr').classList.toggle('lang-active', lang === 'hr');
      document.getElementById('lang-en').classList.toggle('lang-active', lang === 'en');
      currentLang = lang;
    }
    applyLang('hr');
  </script>
</body>
</html>
