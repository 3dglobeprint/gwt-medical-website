  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #004AAD; --blue-dark: #003580; --blue-light: #1A6DD4;
      --blue-pale: #EBF2FF; --white: #FFFFFF;
      --grey-100: #F4F7FB; --grey-200: #E2EAF4; --grey-600: #5A6A7E;
      --text: #111827; --radius: 12px;
      --shadow: 0 4px 24px rgba(0,74,173,0.10);
      --shadow-lg: 0 12px 48px rgba(0,74,173,0.16);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: var(--text); background: var(--white); line-height: 1.6; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--blue); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 72px; box-shadow: 0 2px 16px rgba(0,0,0,0.18); }
    .nav-logo { height: 72px; overflow: hidden; display: flex; align-items: center; }
    .nav-logo img { height: 210px; display: block; flex-shrink: 0; }
    .nav-links { display: flex; gap: 0.2rem; list-style: none; align-items: center; }
    .nav-links > li { position: relative; }
    .nav-links > li > a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.02em; transition: color 0.2s; display: flex; align-items: center; gap: 0.3rem; padding: 0.4rem 0.75rem; border-radius: 6px; white-space: nowrap; }
    .nav-links > li > a:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .nav-arrow { font-size: 0.6rem; opacity: 0.75; transition: transform 0.2s; flex-shrink: 0; }
    .nav-links > li:hover .nav-arrow { transform: rotate(180deg); }
    .nav-dropdown { position: absolute; top: 100%; left: 0; background: #fff; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,74,173,0.18); min-width: 210px; opacity: 0; pointer-events: none; transform: translateY(-4px); transition: opacity 0.2s, transform 0.2s; z-index: 200; padding: 0.4rem; padding-top: 0.6rem; border: 1px solid var(--grey-200); }
    .nav-links > li:hover .nav-dropdown, .nav-links > li:focus-within .nav-dropdown { opacity: 1; pointer-events: all; transform: translateY(0); }
    .nav-dropdown a { display: block; padding: 0.65rem 1rem; color: var(--text); text-decoration: none; font-size: 0.875rem; font-weight: 500; border-radius: 7px; transition: background 0.15s, color 0.15s; white-space: nowrap; }
    .nav-dropdown a:hover { background: var(--blue-pale); color: var(--blue); }
    .nav-contact-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff !important; padding: 0.4rem 1rem !important; border-radius: 6px; transition: background 0.2s !important; }
    .nav-contact-btn:hover { background: rgba(255,255,255,0.25) !important; }
    .lang-dropdown { left: auto !important; right: 0; }
    .lang-active { color: var(--blue) !important; background: var(--blue-pale) !important; }
    /* Flyout submenu */
    .nav-dropdown-item { position: relative; }
    .nav-dropdown-item > a { display: flex; justify-content: space-between; align-items: center; }
    .sub-arrow { font-size: 1rem; opacity: 0.5; margin-left: 0.5rem; }
    .nav-subdropdown { position: absolute; left: 100%; top: 0; background: #fff; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,74,173,0.18); min-width: 200px; opacity: 0; pointer-events: none; transform: translateX(-6px); transition: opacity 0.2s, transform 0.2s; z-index: 300; padding: 0.4rem; border: 1px solid var(--grey-200); }
    .has-submenu:hover .nav-subdropdown { opacity: 1; pointer-events: all; transform: translateX(0); }

    /* HERO */
    .hero { position: relative; min-height: 100vh; display: flex; align-items: center; overflow: hidden; padding-top: 72px; }
    .hero-bg { position: absolute; inset: 0; background-image: url('brand_assets/Rayshape Edge Mini - Banner.png'); background-size: cover; background-position: center; }
    .hero-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(105deg, rgba(0,36,84,0.82) 0%, rgba(0,74,173,0.60) 55%, rgba(0,74,173,0.15) 100%); }
    .hero-content { position: relative; z-index: 2; padding: 5% 5% 6%; max-width: 640px; }
    .hero-badge { display: inline-block; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.9); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.35rem 0.9rem; border-radius: 20px; margin-bottom: 1.4rem; }
    .hero-content h1 { font-size: clamp(2.4rem, 5vw, 4rem); font-weight: 800; color: #fff; line-height: 1.1; margin-bottom: 1rem; }
    .hero-content p { color: rgba(255,255,255,0.78); font-size: 1.1rem; margin-bottom: 2rem; max-width: 480px; line-height: 1.7; }
    .hero-cta { display: inline-flex; align-items: center; gap: 0.5rem; background: #fff; color: var(--blue); font-weight: 700; font-size: 0.95rem; padding: 0.85rem 1.8rem; border-radius: 8px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.25); }

    /* HIGHLIGHTS STRIP */
    .highlights { background: var(--blue); padding: 3rem 5%; }
    .highlights-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: rgba(255,255,255,0.15); border-radius: var(--radius); overflow: hidden; }
    .highlight-item { background: rgba(255,255,255,0.06); padding: 2rem 1.5rem; text-align: center; }
    .highlight-icon { font-size: 2rem; margin-bottom: 0.75rem; display: block; }
    .highlight-item h3 { color: #fff; font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .highlight-item p { color: rgba(255,255,255,0.65); font-size: 0.85rem; line-height: 1.5; }

    /* SECTIONS */
    .section { padding: 6rem 5%; }
    .section-alt { background: var(--grey-100); }
    .section-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 0.75rem; }
    .section-title { font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 800; color: var(--text); line-height: 1.2; margin-bottom: 1rem; }
    .section-subtitle { font-size: 1.05rem; color: var(--grey-600); max-width: 580px; line-height: 1.7; }

    /* INTRO */
    .intro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
    .intro-text { }
    .intro-text p { color: var(--grey-600); margin-top: 1.5rem; line-height: 1.8; font-size: 1.02rem; }
    .intro-image { border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-lg); }
    .intro-image img { width: 100%; display: block; }

    /* SPECS TABLE */
    .specs-wrap { max-width: 780px; margin: 3rem auto 0; }
    .specs-table { width: 100%; border-collapse: collapse; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .specs-table tr:nth-child(odd) { background: var(--white); }
    .specs-table tr:nth-child(even) { background: var(--grey-100); }
    .specs-table td { padding: 1rem 1.4rem; font-size: 0.95rem; border-bottom: 1px solid var(--grey-200); }
    .specs-table td:first-child { font-weight: 600; color: var(--blue); width: 44%; }
    .specs-table tr:last-child td { border-bottom: none; }

    /* APPLICATIONS */
    .apps-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 2.5rem; }
    .app-pill { background: var(--white); border: 1.5px solid var(--grey-200); color: var(--text); font-size: 0.88rem; font-weight: 500; padding: 0.55rem 1.1rem; border-radius: 30px; transition: border-color 0.2s, color 0.2s, background 0.2s; }
    .app-pill:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-pale); }

    /* RESULTS */
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; margin-top: 3rem; }
    .results-image { border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-lg); }
    .results-image img { width: 100%; display: block; }
    .results-text h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem; color: var(--text); }
    .results-text p { color: var(--grey-600); line-height: 1.8; margin-bottom: 1.5rem; font-size: 0.98rem; }
    .compat-badges { display: flex; flex-direction: column; gap: 0.6rem; }
    .compat-badge { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: var(--blue-pale); border-radius: 10px; border-left: 4px solid var(--blue); }
    .compat-badge-dot { width: 10px; height: 10px; background: var(--blue); border-radius: 50%; flex-shrink: 0; }
    .compat-badge span { font-size: 0.88rem; font-weight: 600; color: var(--blue-dark); }

    /* CTA */
    .cta-section { background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%); padding: 6rem 5%; text-align: center; }
    .cta-section h2 { font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 800; color: #fff; margin-bottom: 1rem; }
    .cta-section p { color: rgba(255,255,255,0.72); font-size: 1.05rem; max-width: 520px; margin: 0 auto 2.5rem; line-height: 1.7; }
    .cta-btn { display: inline-block; background: #fff; color: var(--blue); font-weight: 700; font-size: 1rem; padding: 1rem 2.2rem; border-radius: 8px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.28); }
    .cta-note { margin-top: 1.2rem; color: rgba(255,255,255,0.5); font-size: 0.82rem; }

    /* FOOTER */
    footer { background: #033F8F; color: rgba(255,255,255,0.7); padding: 48px 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; }
    .footer-logo img { height: 31px; display: block; }
    .footer-copy { font-size: 0.85rem; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
    .footer-links a:hover { color: #fff; }

    @media (max-width: 900px) {
      .highlights-grid { grid-template-columns: repeat(2, 1fr); }
      .intro-grid, .results-grid { grid-template-columns: 1fr; gap: 2.5rem; }
    }
    @media (max-width: 600px) {
      .highlights-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

      document.documentElement.lang = lang;
      document.getElementById('langLabel').textContent = lang.toUpperCase();
      document.getElementById('lang-hr').classList.toggle('lang-active', lang === 'hr');
